<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxe Dropshoping | Votre boutique d'exception</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@200;300;400;500;700;900&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
    
    <style>
      body {
        margin: 0;
        background-color: #F5F5F5;
        color: #1a1a1a;
        font-family: 'Montserrat', sans-serif;
        top: 0 !important; /* Fix Google Translate bar space */
      }
      /* Pour éviter le flash au chargement */
      #root {
        min-height: 100vh;
        background-color: #F5F5F5;
      }
      /* Google Translate Premium Look */
      .goog-te-banner-frame.skiptranslate {
        display: none !important;
      }
      #google_translate_element {
        position: absolute;
        top: -9999px;
      }
      .goog-te-gadget {
        font-family: 'Montserrat', sans-serif !important;
      }
      .goog-text-highlight {
        background-color: transparent !important;
        box-shadow: none !important;
      }
    </style>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        console.log('🌐 Google Translate Initializing...');
        new google.translate.TranslateElement({
          pageLanguage: 'fr',
          includedLanguages: 'en,fr,es,de,it,pt,ar,zh-CN',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
      window.googleTranslateElementInit = googleTranslateElementInit;
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
