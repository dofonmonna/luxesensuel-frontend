    <style>
      body {
        margin: 0;
        background-color: #F5F5F5;
        color: #1a1a1a;
        font-family: 'Montserrat', sans-serif;
      }
      /* Pour éviter le flash au chargement */
      #root {
        min-height: 100vh;
        background-color: #F5F5F5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Cache busting automatique à chaque build -->
    <script>
      (function () {
        var BUILD = '__BUILD_VERSION__';
        var stored = localStorage.getItem('luxe_build');
        if (stored !== BUILD) {
          localStorage.removeItem('luxesensuel_geo');
          localStorage.removeItem('luxe_trans_v2');
          localStorage.setItem('luxe_build', BUILD);
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
